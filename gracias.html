<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias - El Llamado de Clauneck</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ebano: #0a0a0a;
            --oro: #d4af37;
            --oro-brillante: #f1e5ac;
            --texto: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--ebano);
            color: var(--texto);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .thank-you-box {
            max-width: 600px;
            padding: 40px;
            border: 1px solid #222;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--oro);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            border: 1px solid var(--oro);
            color: var(--oro);
            padding: 12px 25px;
            text-decoration: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: var(--oro);
            color: var(--ebano);
        }
    </style>
</head>
<body>

<div class="thank-you-box">
    <h1>¡Gracias por tu compra!</h1>
    <p>El ritual ha comenzado. Deberías recibir un correo de <strong>Gumroad</strong> con el enlace de descarga de <em>El Llamado de Clauneck</em> en unos instantes.</p>
    <p>Si tienes algún problema con la descarga, puedes contactarme directamente respondiendo al correo de confirmación.</p>
    <a href="index.html" class="back-btn">Volver al inicio</a>
</div>

</body>
</html>
